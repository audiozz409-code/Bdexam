<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — BDExam</title>
<meta name="description" content="Get in touch with the BDExam team.">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a1a;--paper:#f7f2e4;--green:#0b6e4f;--green-dark:#084f39;--red:#c8102e;--rule:#e0d6bd;--muted:#615a4d}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.7}
header{background:var(--green-dark);color:#fff;padding:24px 20px}
.brand{font-family:'Fraunces',serif;font-size:26px;font-weight:700}
.brand span{color:var(--red)}
main{max-width:680px;margin:0 auto;padding:30px 20px}
h1{font-family:'Fraunces',serif;color:var(--green-dark);font-size:24px;margin-bottom:14px}
p{margin-bottom:14px;font-size:15px;color:#332e24}
.card{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:20px;margin-top:16px}
.card b{color:var(--green-dark)}
a.back{display:inline-block;margin-top:20px;color:var(--green-dark);font-weight:600;font-size:13px}
</style>
</head>
<body>
<header><div class="brand">BD<span>Exam</span></div></header>
<main>
<h1>Contact BDExam</h1>
<p>Found an error in a calculation, have a suggestion for a new board guide, or need to reach us for an advertising inquiry? We'd like to hear from you.</p>
<div class="card">
  <p><b>Email:</b> contact@bdexam.pages.dev</p>
  <p><b>Response time:</b> We aim to reply within 3–5 business days.</p>
</div>
<a class="back" href="index.html">← Back to Home</a>
</main>
</body>
</html>
